name: 部署配置网页到 GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 与检测 workflow 互斥,避免并发
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传网页产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
