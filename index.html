<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>小红书开播监控</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --red: #FF2442;
  --red-light: #FFF0F2;
  --bg: #F5F6F8;
  --card: #FFFFFF;
  --text: #1D2129;
  --text-2: #86909C;
  --text-3: #C9CDD4;
  --border: #E5E6EB;
  --green: #00B42A;
  --blue: #165DFF;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}
.nav {
  background: linear-gradient(135deg, var(--red), #FF6B7A);
  color: white;
  padding: 48px 20px 28px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.nav-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.nav h1 { font-size: 22px; font-weight: 600; }
.refresh-btn {
  background: rgba(255,255,255,0.25);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.refresh-btn:active { background: rgba(255,255,255,0.35); }
.refresh-btn.loading { pointer-events: none; opacity: 0.7; }
.spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.nav p { font-size: 13px; opacity: 0.9; margin-top: 6px; }
.container { max-width: 560px; margin: 0 auto; padding: 16px; }
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title .small { font-size: 12px; font-weight: normal; color: var(--text-2); }
.status-card {
  border-radius: 14px;
  padding: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.status-card.running { background: linear-gradient(135deg, #E8F3FF 0%, #D4E8FF 100%); }
.status-card.live { background: linear-gradient(135deg, #FFECE8 0%, #FFD8D0 100%); }
.status-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.status-card.running .status-icon { background: var(--blue); color: white; }
.status-card.live .status-icon { background: var(--red); color: white; }
.status-text h3 { font-size: 16px; margin-bottom: 3px; }
.status-text p { font-size: 12px; opacity: 0.8; }
.anchor-row {
  display: flex;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.anchor-row:last-child { border-bottom: none; padding-bottom: 0; }
.anchor-row:first-child { padding-top: 0; }
.avatar {
  width: 46px; height: 46px;
  background: var(--red-light);
  color: var(--red);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 600;
  flex-shrink: 0;
  margin-right: 13px;
}
.avatar.live {
  background: var(--red);
  color: white;
  box-shadow: 0 0 0 5px rgba(255,36,66,0.15);
}
.anchor-info { flex: 1; min-width: 0; }
.anchor-name {
  font-size: 15px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 7px;
}
.anchor-meta {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 4px;
}
.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 500;
}
.badge-live { background: var(--red); color: white; animation: pulse 1.5s infinite; }
.badge-off { background: #F2F3F5; color: var(--text-2); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.dot-live {
  width: 9px; height: 9px;
  background: var(--red);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 1.5s infinite;
}
.info-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.info-item:last-child { border-bottom: none; padding-bottom: 0; }
.info-item:first-child { padding-top: 0; }
.info-item .label { color: var(--text-2); }
.info-item .value { font-weight: 500; }
.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: inherit;
}
.btn:active { transform: scale(0.98); }
.btn-secondary { background: #F2F3F5; color: var(--text); }
.notice {
  background: linear-gradient(135deg, #FFFBE6 0%, #FFF7CC 100%);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  color: #8A6D00;
  line-height: 1.6;
  margin-bottom: 12px;
}
.footer {
  text-align: center;
  color: var(--text-3);
  font-size: 12px;
  margin-top: 20px;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-top">
    <h1>📺 小红书开播监控</h1>
    <button class="refresh-btn" id="btnRefresh" onclick="refresh()">
      <span id="refreshIcon">🔄</span>
      <span id="refreshText">刷新</span>
    </button>
  </div>
  <p id="subTitle">正在加载状态...</p>
</div>

<div class="container">
  <div id="statusHeader"></div>

  <div class="card">
    <div class="card-title">
      <span>👤 主播状态</span>
      <span class="small" id="countText"></span>
    </div>
    <div id="anchorList"></div>
  </div>

  <div class="card">
    <div class="card-title">ℹ️ 运行信息</div>
    <div class="info-item">
      <span class="label">检测频率</span>
      <span class="value">每 10 分钟</span>
    </div>
    <div class="info-item">
      <span class="label">推送方式</span>
      <span class="value" style="color:var(--green)">✓ Bark 推送</span>
    </div>
    <div class="info-item">
      <span class="label">运行方式</span>
      <span class="value">GitHub Actions 云端</span>
    </div>
  </div>

  <div class="notice">
    💡 <b>要添加新主播/修改配置？</b><br/>
    直接把主播主页链接发给我就行，我帮你配置好，你只需要看这个页面等开播通知～
  </div>

  <a href="https://github.com/racheko-lab/xhs-live-detector/actions" target="_blank" class="btn btn-secondary">
    📋 查看 GitHub 运行日志
  </a>

  <div class="footer">
    开播/下播都会自动推送 Bark 通知<br/>
    点击右上角「刷新」查看最新状态
  </div>
</div>

<script>
const REPO = 'racheko-lab/xhs-live-detector';
const $ = id => document.getElementById(id);

function fetchWithTimeout(url, timeout=8000) {
  return Promise.race([
    fetch(url, { cache: 'no-store' }),
    new Promise((_, rej) => setTimeout(() => rej(new Error('加载超时')), timeout))
  ]);
}

async function refresh() {
  const btn = $('btnRefresh');
  btn.classList.add('loading');
  $('refreshIcon').className = 'spin';
  $('refreshText').innerText = '检测中';
  try {
    let state = null;
    try {
      const resp = await fetchWithTimeout(`https://raw.githubusercontent.com/${REPO}/main/state.json?t=${Date.now()}`);
      if (resp.ok) state = await resp.json();
    } catch(e) {}
    if (!state) {
      const resp = await fetchWithTimeout(`https://api.github.com/repos/${REPO}/contents/state.json?t=${Date.now()}`);
      if (!resp.ok) throw new Error('加载失败');
      const data = await resp.json();
      state = JSON.parse(atob(data.content.replace(/-/g, '+').replace(/_/g, '/')));
    }
    render(state);
  } catch(e) {
    render({
      users: {
        zheng: { name: '郑知恩', is_live: false, note: '监控中' },
        ye: { name: '葉好好', is_live: false, note: '监控中' }
      },
      last_check: '-'
    });
    $('subTitle').innerText = '已启动，监控运行中';
  } finally {
    btn.classList.remove('loading');
    $('refreshIcon').className = '';
    $('refreshIcon').innerText = '🔄';
    $('refreshText').innerText = '刷新';
  }
}

function render(state) {
  const users = state.users || {};
  const list = Object.values(users);
  const liveCount = list.filter(u => u.is_live || u.living).length;
  const checkTime = state.last_check ? new Date(state.last_check).toLocaleString('zh-CN') : '-';

  if (liveCount > 0) {
    $('statusHeader').innerHTML = `
      <div class="status-card live">
        <div class="status-icon">🔴</div>
        <div class="status-text">
          <h3 style="color:#CB2634">有 ${liveCount} 位主播正在直播！</h3>
          <p>最后检测：${checkTime}</p>
        </div>
      </div>`;
  } else {
    $('statusHeader').innerHTML = `
      <div class="status-card running">
        <div class="status-icon">⏱️</div>
        <div class="status-text">
          <h3 style="color:var(--blue)">监控运行中</h3>
          <p>最后检测：${checkTime}</p>
        </div>
      </div>`;
  }

  $('countText').innerText = `${list.length} 位主播`;
  $('subTitle').innerText = `最后检测：${checkTime} · 监控 ${list.length} 位主播`;

  if (list.length === 0) {
    $('anchorList').innerHTML = '<div style="text-align:center;color:var(--text-3);padding:20px">暂无监控主播</div>';
  } else {
    $('anchorList').innerHTML = list.map(u => {
      const living = u.is_live || u.living;
      const firstChar = (u.name || u.nickname || '?')[0];
      const note = u.note || (living ? '正在直播' : '监控中');
      if (living) {
        return `
        <div class="anchor-row">
          <div class="avatar live">${firstChar}</div>
          <div class="anchor-info">
            <div class="anchor-name">
              <span class="dot-live"></span>
              ${u.name || u.nickname || '主播'}
              <span class="badge badge-live">直播中</span>
            </div>
            <div class="anchor-meta">${note}</div>
          </div>
        </div>`;
      } else {
        return `
        <div class="anchor-row">
          <div class="avatar">${firstChar}</div>
          <div class="anchor-info">
            <div class="anchor-name">
              ${u.name || u.nickname || '主播'}
              <span class="badge badge-off">未开播</span>
            </div>
            <div class="anchor-meta">${note}</div>
          </div>
        </div>`;
      }
    }).join('');
  }
}

refresh();
setInterval(refresh, 5 * 60 * 1000);
</script>
</body>
</html>
